aid: microcks
name: Microcks
description: >-
  Microcks is an open source, cloud-native tool for API mocking and testing.
  It provides a platform for importing API contracts (OpenAPI, AsyncAPI, Postman
  Collections), generating mock responses, and running test suites. It shortens
  the feedback loop for API development teams.
