        outputParameters:
        - name: result
          type: object
          value: $.
    - name: keycloak-config
      path: /keycloak/config
      operations:
      - name: getkeycloakconfig
        method: GET
        description: Get authentification configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: secrets
      path: /secrets
      operations:
      - name: getsecrets
        method: GET
        description: Get Secrets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page of Secrets to retrieve (starts at and defaults to 0)
        - name: size
          in: query
          type: integer
          description: Size of a page. Maximum number of Secrets to include in a response (defaults to 20)
      - name: createsecret
        method: POST
        description: Create a new Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: secrets-count
      path: /secrets/count
      operations:
      - name: getsecretscounter
        method: GET
        description: Get the Secrets counter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: secrets-search
      path: /secrets/search
      operations:
      - name: searchsecrets
        method: GET
        description: Search for Secrets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Search using this name-like criterion
          required: true
    - name: secrets-id
      path: /secrets/{id}
      operations:
      - name: getsecret
        method: GET
        description: Get Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesecret
        method: PUT
