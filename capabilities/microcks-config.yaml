          required: true
      - name: deletesecret
        method: DELETE
        description: Delete Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROCKS_API_KEY}}'
