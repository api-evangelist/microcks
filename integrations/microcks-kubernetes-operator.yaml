naftiko: 1.0.0-alpha2
info:
  label: Reconcile Microcks Services from the Kubernetes operator
  description: Watch MicrocksInstall + APIServiceImporter CRs in Kubernetes and drive Microcks imports + service lifecycle via its REST API so cluster manifests are the source of truth.
  tags:
  - Microcks
  - Integration
  - Runtime / Kubernetes
  - kubernetes-operator
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    MICROCKS_API_KEY: MICROCKS_API_KEY
    KUBERNETES_OPERATOR_API_KEY: KUBERNETES_OPERATOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: microcks
    baseUri: https://microcks.example.com/api
    description: Microcks API operations consumed by this integration.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: getimportjobs
        method: GET
        description: List Microcks import jobs the operator should reconcile.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: jobs
      path: /jobs
      operations:
      - name: createimportjob
        method: POST
        description: Create a Microcks import job from an APIServiceImporter CR.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: jobs-id-start
      path: /jobs/{id}/start
      operations:
      - name: startimportjob
        method: PUT
        description: Start the import job when the CR moves to Active.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: jobs-id
      path: /jobs/{id}
      operations:
      - name: deleteimportjob
        method: DELETE
        description: Tear down the import job when the CR is deleted.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  - type: http
    namespace: kubernetes-operator
    baseUri: https://kubernetes.default.svc
    description: Kubernetes API operations consumed by this integration.
    resources:
    - name: apis-microcks-io-v1alpha1-namespaces-namespace-apiserviceimp
      path: /apis/microcks.io/v1alpha1/namespaces/{namespace}/apiserviceimporters
      operations:
      - name: listapiserviceimporters
        method: GET
        description: 'Kubernetes API: listApiServiceImporters'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespace
          in: path
          type: string
          description: Path parameter namespace.
          required: true
    - name: apis-microcks-io-v1alpha1-namespaces-namespace-apiserviceimp
      path: /apis/microcks.io/v1alpha1/namespaces/{namespace}/apiserviceimporters/{name}/status
      operations:
      - name: patchimporterstatus
        method: PATCH
        description: 'Kubernetes API: patchImporterStatus'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespace
          in: path
          type: string
          description: Path parameter namespace.
          required: true
        - name: name
          in: path
          type: string
          description: Path parameter name.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: microcks-kubernetes-operator-mcp
    description: MCP adapter for the microcks-kubernetes-operator integration.
    tools:
    - name: microcks_kubernetes_operator
      description: Execute the microcks kubernetes operator integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: microcks-kubernetes-operator-rest
    port: 8080
    description: REST adapter for the microcks-kubernetes-operator integration.
    resources:
    - path: /microcks-kubernetes-operator
      name: microcks-kubernetes-operator
      description: REST surface for the microcks-kubernetes-operator integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the microcks-kubernetes-operator integration.
        call: microcks_kubernetes_operator
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
